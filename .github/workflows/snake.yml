name: Generate contribution snake

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: krwg
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Process SVG colors
        run: |
          python3 << 'EOF'
          import re
          import sys

          def process_svg(input_file, output_file, is_dark=False):
              with open(input_file, 'r') as f:
                  content = f.read()
              
      
              
              if is_dark:
         
                  replacements = {
                      '#161b22': '#161b22',  
                      '#0e4429': '#3d2e0f',  
                      '#006d32': '#6b5228',  
                      '#26a641': '#a08040',  
                      '#39d353': '#c8a96e',  
                  }
              else:

                  replacements = {
                      '#ebedf0': '#ebedf0',  
                      '#c6e48b': '#f0e6d0',  
                      '#7bc96f': '#d4c29a',  
                      '#239a3b': '#b08d4f',  
                      '#196127': '#7d5e1b',  
                  }
              

              for old, new in replacements.items():

                  content = content.replace(old, new)
                  content = content.replace(old.upper(), new)
                  content = content.replace(old.lower(), new)
              

              snake_colors = {
                  '#9be9a8': '#c8a96e',
                  '#40c463': '#b08d4f', 
                  '#30a14e': '#967530',
                  '#216e39': '#7d5e1b',
                  '#3fb950': '#c8a96e',
                  '#2ea043': '#b08d4f',
                  '#238636': '#967530',
                  '#196c2e': '#7d5e1b',

                  '#7bc96f': '#d4c29a',
                  '#c6e48b': '#f0e6d0',
                  '#0e4429': '#3d2e0f',
                  '#006d32': '#6b5228',
                  '#26a641': '#a08040',
                  '#39d353': '#c8a96e',
              }
              
              for old, new in snake_colors.items():
                  content = content.replace(old, new)
                  content = content.replace(old.upper(), new)
                  content = content.replace(old.lower(), new)
              

              rgb_replacements = {
                  'rgb(235, 237, 240)': '#ebedf0',
                  'rgb(198, 228, 139)': '#f0e6d0',
                  'rgb(123, 201, 111)': '#d4c29a',
                  'rgb(35, 154, 59)': '#b08d4f',
                  'rgb(25, 97, 39)': '#7d5e1b',
                  'rgb(155, 233, 168)': '#c8a96e',
                  'rgb(64, 196, 99)': '#b08d4f',
                  'rgb(48, 161, 78)': '#967530',
                  'rgb(33, 110, 57)': '#7d5e1b',
                  'rgb(22, 27, 34)': '#161b22',
                  'rgb(14, 68, 41)': '#3d2e0f',
                  'rgb(0, 109, 50)': '#6b5228',
                  'rgb(38, 166, 65)': '#a08040',
                  'rgb(57, 211, 83)': '#c8a96e',
              }
              
              for old, new in rgb_replacements.items():
                  content = content.replace(old, new)
                  content = content.replace(old.replace(', ', ','), new)
              
              with open(output_file, 'w') as f:
                  f.write(content)
              
              print(f"Processed {input_file} -> {output_file}")

          process_svg('dist/github-contribution-grid-snake.svg', 'dist/github-contribution-grid-snake.svg', is_dark=False)
          process_svg('dist/github-contribution-grid-snake-dark.svg', 'dist/github-contribution-grid-snake-dark.svg', is_dark=True)
          EOF

      - name: Debug SVG colors
        run: |
          echo "=== Light SVG colors ==="
          grep -oP 'fill="[^"]*"' dist/github-contribution-grid-snake.svg | sort | uniq -c | head -20
          echo ""
          echo "=== Dark SVG colors ==="  
          grep -oP 'fill="[^"]*"' dist/github-contribution-grid-snake-dark.svg | sort | uniq -c | head -20

      - name: Push SVGs to branch output
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          force_orphan: true
