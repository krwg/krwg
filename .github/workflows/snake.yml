name: Generate contribution snake

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: krwg
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Replace colors in SVG (light)
        run: |
          python3 << 'EOF'
          import re

          with open('dist/github-contribution-grid-snake.svg', 'r') as f:
              content = f.read()


          content = re.sub(r'#ebedf0\b', '#0d1117', content)
          content = re.sub(r'#c6e48b\b', '#c8a96e', content)
          content = re.sub(r'#7bc96f\b', '#b08d4f', content)
          content = re.sub(r'#239a3b\b', '#967530', content)
          content = re.sub(r'#196127\b', '#7d5e1b', content)

          content = re.sub(r'#9be9a8\b', '#c8a96e', content)
          content = re.sub(r'#40c463\b', '#b08d4f', content)
          content = re.sub(r'#30a14e\b', '#967530', content)
          content = re.sub(r'#216e39\b', '#7d5e1b', content)


          with open('dist/github-contribution-grid-snake.svg', 'w') as f:
              f.write(content)
          EOF

      - name: Replace colors in SVG (dark)
        run: |
          python3 << 'EOF'
          import re

          with open('dist/github-contribution-grid-snake-dark.svg', 'r') as f:
              content = f.read()


          content = re.sub(r'#161b22\b', '#0d1117', content)
          content = re.sub(r'#0e4429\b', '#c8a96e', content)
          content = re.sub(r'#006d32\b', '#b08d4f', content)
          content = re.sub(r'#26a641\b', '#967530', content)
          content = re.sub(r'#39d353\b', '#7d5e1b', content)


          content = re.sub(r'#3fb950\b', '#c8a96e', content)
          content = re.sub(r'#2ea043\b', '#b08d4f', content)
          content = re.sub(r'#238636\b', '#967530', content)
          content = re.sub(r'#196c2e\b', '#7d5e1b', content)

          with open('dist/github-contribution-grid-snake-dark.svg', 'w') as f:
              f.write(content)
          EOF

      - name: Push SVGs to branch output
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          force_orphan: true
